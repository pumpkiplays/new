<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Roblox Kit Fitting</title>
  <style>
    *{box-sizing:border-box} :root{color-scheme:dark;--bg:#090a0f;--panel:rgba(15,17,23,.97);--line:#303642;--text:#f7f8fc;--muted:#9da5b4;--accent:#735cff}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    body{display:grid;grid-template-columns:330px 1fr}
    aside{z-index:20;height:100dvh;overflow-y:auto;padding:22px;background:var(--panel);border-right:1px solid var(--line);backdrop-filter:blur(18px)}
    h1{margin:0;font-size:19px}.subtitle{margin:5px 0 22px;color:var(--muted);font-size:12px;line-height:1.45}
    section{padding:17px 0;border-top:1px solid var(--line)} h2{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .upload{display:grid;gap:5px;min-height:88px;padding:16px;align-content:center;border:1px dashed #555d6c;border-radius:13px;background:#181b23;cursor:pointer}
    .upload input{display:none}.upload strong{font-size:14px}.upload span{color:var(--muted);font-size:11px}
    label.control{display:grid;grid-template-columns:1fr auto;gap:5px 10px;margin:14px 0;font-size:12px}
    label.control output{color:var(--muted);font-variant-numeric:tabular-nums} input[type=range]{grid-column:1/-1;width:100%;accent-color:var(--accent)}
    button{width:100%;border:1px solid #3a414d;border-radius:11px;padding:11px 12px;color:#fff;font:inherit;font-size:13px;font-weight:700;cursor:pointer;background:#242934}
    button.primary{border:0;background:linear-gradient(135deg,var(--accent),#4a91ff)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .note{color:var(--muted);font-size:11px;line-height:1.5}
    main{position:relative;min-width:0;min-height:0;background:radial-gradient(circle at 50% 34%,rgba(118,89,255,.18),transparent 35%),linear-gradient(#141722,#090a0f)}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    #loading,#status{position:absolute;left:50%;transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.64);backdrop-filter:blur(8px);font-size:12px}
    #loading{top:50%;transform:translate(-50%,-50%)}#status{bottom:14px;color:#c6cad3}
    #menuButton{display:none;position:absolute;z-index:30;top:12px;left:12px;width:auto;padding:10px 13px;background:rgba(16,18,24,.92)}
    @media(max-width:760px){body{display:block}aside{position:absolute;inset:0 auto 0 0;width:min(89vw,335px);transform:translateX(-102%);transition:transform .22s ease;box-shadow:15px 0 40px rgba(0,0,0,.45)}aside.open{transform:translateX(0)}main{width:100%;height:100dvh}#menuButton{display:block}}
  </style>
</head>
<body>
  <aside id="panel">
    <h1>Roblox Kit Fitting</h1>
    <p class="subtitle">Clean V-neck, covered shoulders, shorter straight sleeves, and a smooth hem.</p>
    <section>
      <h2>Kit texture</h2>
      <label class="upload">
        <input id="shirtUpload" type="file" accept="image/png,image/jpeg,image/webp">
        <strong>Upload kit texture</strong>
        <span>Use an upright front-facing texture.</span>
      </label>
    </section>
    <section>
      <h2>Texture controls</h2>
      <label class="control">Horizontal offset <output id="offsetXOut">0.00</output><input id="offsetX" type="range" min="-1" max="1" step="0.01" value="0"></label>
      <label class="control">Vertical offset <output id="offsetYOut">0.00</output><input id="offsetY" type="range" min="-1" max="1" step="0.01" value="0"></label>
      <label class="control">Horizontal scale <output id="repeatXOut">1.00</output><input id="repeatX" type="range" min="0.25" max="3" step="0.01" value="1"></label>
      <label class="control">Vertical scale <output id="repeatYOut">1.00</output><input id="repeatY" type="range" min="0.25" max="3" step="0.01" value="1"></label>
      <label class="control">Roughness <output id="roughnessOut">84%</output><input id="roughness" type="range" min="0" max="1" step="0.01" value="0.84"></label>
    </section>
    <section class="buttons">
      <button id="flipHorizontal">Flip horizontal</button>
      <button id="flipVertical">Flip vertical</button>
      <button id="reset">Reset</button>
      <button id="save" class="primary">Save PNG</button>
    </section>
    <p class="note">Required: index.html, roblox_boy.glb, shirt.glb, and optionally sample-shirt.png.</p>
  </aside>
  <main>
    <button id="menuButton">Controls</button>
    <canvas id="viewport"></canvas>
    <div id="loading">Loading avatar and shirt…</div>
    <div id="status">Drag to inspect the fit</div>
  </main>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
  <script type="module">
    import * as THREE from "three";
    import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";
    import {OrbitControls} from "three/addons/controls/OrbitControls.js";

    const canvas=document.querySelector("#viewport"),loading=document.querySelector("#loading"),panel=document.querySelector("#panel");
    document.querySelector("#menuButton").onclick=()=>panel.classList.toggle("open");

    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.outputColorSpace=THREE.SRGBColorSpace;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure=1.08;
    renderer.shadowMap.enabled=true;

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(28,1,.01,100);
    camera.position.set(0,1.8,8.7);

    const controls=new OrbitControls(camera,canvas);
    controls.target.set(0,1.75,0);
    controls.enableDamping=true;
    controls.enablePan=false;
    controls.minDistance=6.3;
    controls.maxDistance=10.5;
    controls.minPolarAngle=Math.PI*.37;
    controls.maxPolarAngle=Math.PI*.63;
    controls.minAzimuthAngle=-.9;
    controls.maxAzimuthAngle=.9;

    scene.add(new THREE.HemisphereLight(0xeff2ff,0x25212d,2.8));
    const key=new THREE.DirectionalLight(0xffffff,4.3);key.position.set(4,6,5);key.castShadow=true;scene.add(key);
    const fill=new THREE.DirectionalLight(0x8d7aff,2.6);fill.position.set(-4,3,4);scene.add(fill);
    const rim=new THREE.DirectionalLight(0x5d7dff,2.4);rim.position.set(-3,4,-4);scene.add(rim);

    const floor=new THREE.Mesh(new THREE.CircleGeometry(5,96),new THREE.MeshStandardMaterial({color:0x151823,roughness:.9}));
    floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

    const loader=new GLTFLoader(),group=new THREE.Group();scene.add(group);
    let shirtMaterial,currentTexture,flipX=false,flipY=false;

    const fields={
      offsetX:document.querySelector("#offsetX"),
      offsetY:document.querySelector("#offsetY"),
      repeatX:document.querySelector("#repeatX"),
      repeatY:document.querySelector("#repeatY"),
      roughness:document.querySelector("#roughness")
    };
    const outputs={
      offsetX:document.querySelector("#offsetXOut"),
      offsetY:document.querySelector("#offsetYOut"),
      repeatX:document.querySelector("#repeatXOut"),
      repeatY:document.querySelector("#repeatYOut"),
      roughness:document.querySelector("#roughnessOut")
    };
    const defaults={offsetX:0,offsetY:0,repeatX:1,repeatY:1,roughness:.84};

    const loadGLB=url=>new Promise((resolve,reject)=>loader.load(url,g=>resolve(g.scene),undefined,reject));

    function updateTexture(){
      const v={};for(const[k,input]of Object.entries(fields))v[k]=Number(input.value);
      if(currentTexture){
        currentTexture.repeat.x=(flipX?-1:1)*v.repeatX;
        currentTexture.repeat.y=(flipY?-1:1)*v.repeatY;
        currentTexture.offset.x=v.offsetX+(flipX?1:0);
        currentTexture.offset.y=v.offsetY+(flipY?1:0);
        currentTexture.needsUpdate=true;
      }
      if(shirtMaterial){shirtMaterial.roughness=v.roughness;shirtMaterial.needsUpdate=true}
      outputs.offsetX.value=v.offsetX.toFixed(2);outputs.offsetY.value=v.offsetY.toFixed(2);
      outputs.repeatX.value=v.repeatX.toFixed(2);outputs.repeatY.value=v.repeatY.toFixed(2);
      outputs.roughness.value=`${Math.round(v.roughness*100)}%`;
    }

    Object.values(fields).forEach(input=>input.addEventListener("input",updateTexture));

    function loadTexture(url,optional=false){
      new THREE.TextureLoader().load(url,texture=>{
        texture.colorSpace=THREE.SRGBColorSpace;
        texture.flipY=false;
        texture.wrapS=THREE.ClampToEdgeWrapping;
        texture.wrapT=THREE.ClampToEdgeWrapping;
        texture.anisotropy=renderer.capabilities.getMaxAnisotropy();
        if(currentTexture)currentTexture.dispose();
        currentTexture=texture;
        shirtMaterial.map=currentTexture;
        shirtMaterial.needsUpdate=true;
        updateTexture();
      },undefined,error=>{if(!optional)console.error(error)});
    }

    async function initialise(){
      try{
        const[avatar,shirt]=await Promise.all([loadGLB("./roblox_boy.glb"),loadGLB("./shirt.glb")]);
        group.add(avatar);group.add(shirt);

        avatar.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true}});
        shirtMaterial=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.84,metalness:0,side:THREE.DoubleSide});
        shirt.traverse(o=>{if(o.isMesh){o.material=shirtMaterial;o.castShadow=true;o.receiveShadow=true;o.renderOrder=10}});

        const box=new THREE.Box3().setFromObject(avatar),size=box.getSize(new THREE.Vector3()),center=box.getCenter(new THREE.Vector3()),scale=3.4/size.y;
        group.scale.setScalar(scale);
        group.position.set(-center.x*scale,-box.min.y*scale,-center.z*scale);

        loading.hidden=true;
        loadTexture("./sample-shirt.png",true);
      }catch(error){
        console.error(error);
        loading.textContent="Could not load roblox_boy.glb or shirt.glb.";
      }
    }

    document.querySelector("#shirtUpload").onchange=e=>{const file=e.target.files?.[0];if(file){loadTexture(URL.createObjectURL(file));panel.classList.remove("open")}};
    document.querySelector("#flipHorizontal").onclick=()=>{flipX=!flipX;updateTexture()};
    document.querySelector("#flipVertical").onclick=()=>{flipY=!flipY;updateTexture()};
    document.querySelector("#reset").onclick=()=>{flipX=false;flipY=false;for(const[k,v]of Object.entries(defaults))fields[k].value=String(v);updateTexture();camera.position.set(0,1.8,8.7);controls.target.set(0,1.75,0);controls.update()};
    document.querySelector("#save").onclick=()=>{renderer.render(scene,camera);const a=document.createElement("a");a.download="roblox-kit-preview.png";a.href=renderer.domElement.toDataURL("image/png");a.click()};

    function resize(){
      const w=canvas.clientWidth,h=canvas.clientHeight;
      if(canvas.width!==Math.floor(w*renderer.getPixelRatio())||canvas.height!==Math.floor(h*renderer.getPixelRatio())){
        renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();
      }
    }

    function animate(){requestAnimationFrame(animate);resize();controls.update();renderer.render(scene,camera)}
    updateTexture();initialise();animate();
  </script>
</body>
</html>
