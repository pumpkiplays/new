<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Kit Lab</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <aside class="panel">
    <div class="brand">
      <span class="brand-mark">R</span>
      <div>
        <h1>Roblox Kit Lab</h1>
        <p>Shirt overlay prototype</p>
      </div>
    </div>

    <section>
      <h2>1. Upload shirt artwork</h2>
      <label class="upload">
        <input id="shirtUpload" type="file" accept="image/png,image/jpeg,image/webp" />
        <span>Choose PNG, JPG or WebP</span>
        <small>Transparent PNG works best.</small>
      </label>
      <button id="sampleButton" class="secondary">Use sample shirt</button>
    </section>

    <section>
      <h2>2. Adjust placement</h2>

      <label>
        Horizontal
        <output id="xValue">0.00</output>
        <input id="xControl" type="range" min="-1.5" max="1.5" step="0.01" value="0" />
      </label>

      <label>
        Vertical
        <output id="yValue">1.60</output>
        <input id="yControl" type="range" min="-0.5" max="3.5" step="0.01" value="1.60" />
      </label>

      <label>
        Depth
        <output id="zValue">0.43</output>
        <input id="zControl" type="range" min="-1.5" max="1.5" step="0.01" value="0.43" />
      </label>

      <label>
        Width
        <output id="widthValue">1.25</output>
        <input id="widthControl" type="range" min="0.15" max="3" step="0.01" value="1.25" />
      </label>

      <label>
        Height
        <output id="heightValue">1.25</output>
        <input id="heightControl" type="range" min="0.15" max="3" step="0.01" value="1.25" />
      </label>

      <label>
        Rotation
        <output id="rotationValue">0°</output>
        <input id="rotationControl" type="range" min="-180" max="180" step="1" value="0" />
      </label>

      <label>
        Opacity
        <output id="opacityValue">100%</output>
        <input id="opacityControl" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
    </section>

    <section class="button-row">
      <button id="resetButton" class="secondary">Reset</button>
      <button id="screenshotButton">Save preview</button>
    </section>

    <div class="hint">
      Drag to rotate · Scroll to zoom · Right-drag to move
    </div>
  </aside>

  <main>
    <canvas id="viewport"></canvas>
    <div id="loading" class="loading">Loading model…</div>
    <div class="badge">Prototype · Image-plane overlay</div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
