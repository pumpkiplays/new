<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Roblox Shirt Overlay</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --panel: rgba(16, 18, 24, 0.96);
      --line: #303541;
      --text: #f6f7fb;
      --muted: #a2a8b5;
      --accent: #775cff;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #090a0f;
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    aside {
      z-index: 10;
      height: 100dvh;
      overflow-y: auto;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: 19px;
    }

    .subtitle {
      margin: 5px 0 22px;
      color: var(--muted);
      font-size: 12px;
    }

    section {
      padding: 17px 0;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #dfe2ea;
    }

    .upload {
      display: grid;
      gap: 4px;
      min-height: 86px;
      padding: 16px;
      align-content: center;
      border: 1px dashed #555c6b;
      border-radius: 13px;
      background: #181b23;
      cursor: pointer;
    }

    .upload input { display: none; }
    .upload strong { font-size: 14px; }
    .upload span { color: var(--muted); font-size: 11px; }

    label.control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5px 10px;
      margin: 14px 0;
      font-size: 12px;
      color: #d8dbe4;
    }

    label.control output {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      border: 1px solid #3b414e;
      border-radius: 11px;
      padding: 11px 12px;
      color: white;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: #242833;
    }

    button.primary {
      border: 0;
      background: linear-gradient(135deg, var(--accent), #4b91ff);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(120, 89, 255, .17), transparent 34%),
        linear-gradient(#141722, #090a0f);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading, #status {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(8px);
      font-size: 12px;
    }

    #loading { top: 50%; transform: translate(-50%, -50%); }
    #status { bottom: 16px; color: #c4c8d2; }

    #menuButton {
      display: none;
      position: absolute;
      z-index: 20;
      top: 12px;
      left: 12px;
      width: auto;
      padding: 10px 13px;
      background: rgba(16,18,24,.9);
    }

    @media (max-width: 760px) {
      body { display: block; }

      aside {
        position: absolute;
        inset: 0 auto 0 0;
        width: min(88vw, 330px);
        transform: translateX(-102%);
        transition: transform .22s ease;
        box-shadow: 15px 0 40px rgba(0,0,0,.4);
      }

      aside.open { transform: translateX(0); }

      main {
        width: 100%;
        height: 100dvh;
      }

      #menuButton { display: block; }
    }
  </style>
</head>

<body>
  <aside id="panel">
    <h1>Roblox Shirt Overlay</h1>
    <p class="subtitle">Front-facing prototype with automatic chest placement</p>

    <section>
      <h2>Shirt image</h2>
      <label class="upload">
        <input id="shirtUpload" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" />
        <strong>Upload shirt image</strong>
        <span>Use a transparent, front-facing PNG for the best result.</span>
      </label>
    </section>

    <section>
      <h2>Fine positioning</h2>

      <label class="control">
        Horizontal <output id="xOut">0.00</output>
        <input id="x" type="range" min="-1.2" max="1.2" step="0.01" value="0" />
      </label>

      <label class="control">
        Vertical <output id="yOut">2.14</output>
        <input id="y" type="range" min="1.20" max="2.90" step="0.01" value="2.14" />
      </label>

      <label class="control">
        Width <output id="wOut">2.36</output>
        <input id="w" type="range" min="0.8" max="3.4" step="0.01" value="2.36" />
      </label>

      <label class="control">
        Height <output id="hOut">1.52</output>
        <input id="h" type="range" min="0.6" max="2.6" step="0.01" value="1.52" />
      </label>

      <label class="control">
        Depth <output id="zOut">0.54</output>
        <input id="z" type="range" min="0.30" max="0.90" step="0.005" value="0.54" />
      </label>

      <label class="control">
        Opacity <output id="opacityOut">100%</output>
        <input id="opacity" type="range" min="0" max="1" step="0.01" value="1" />
      </label>
    </section>

    <section class="buttons">
      <button id="reset">Reset fit</button>
      <button id="save" class="primary">Save PNG</button>
    </section>

    <p class="note">
      This version intentionally locks the model to a front-facing camera.
      The shirt is placed as a flat transparent layer just in front of the torso.
    </p>
  </aside>

  <main>
    <button id="menuButton">Controls</button>
    <canvas id="viewport"></canvas>
    <div id="loading">Loading model…</div>
    <div id="status">Front view locked</div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const canvas = document.querySelector("#viewport");
    const loading = document.querySelector("#loading");
    const panel = document.querySelector("#panel");

    document.querySelector("#menuButton").addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      preserveDrawingBuffer: true
    });

    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(28, 1, 0.01, 100);
    camera.position.set(0, 1.72, 8.8);
    camera.lookAt(0, 1.72, 0);

    scene.add(new THREE.HemisphereLight(0xeef1ff, 0x25212d, 2.8));

    const key = new THREE.DirectionalLight(0xffffff, 4.2);
    key.position.set(4, 6, 5);
    key.castShadow = true;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x8f7aff, 2.8);
    fill.position.set(-4, 3, 4);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0x5f7cff, 2.4);
    rim.position.set(-3, 4, -4);
    scene.add(rim);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(5, 96),
      new THREE.MeshStandardMaterial({ color: 0x151823, roughness: .9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const MODEL_HEIGHT = 3.4;
    let model;

    new GLTFLoader().load(
      "./roblox_boy.glb",
      (gltf) => {
        model = gltf.scene;
        scene.add(model);

        model.traverse((object) => {
          if (object.isMesh) {
            object.castShadow = true;
            object.receiveShadow = true;
          }
        });

        const originalBox = new THREE.Box3().setFromObject(model);
        const originalSize = originalBox.getSize(new THREE.Vector3());
        const originalCenter = originalBox.getCenter(new THREE.Vector3());
        const scale = MODEL_HEIGHT / originalSize.y;

        model.scale.setScalar(scale);
        model.position.set(
          -originalCenter.x * scale,
          -originalBox.min.y * scale,
          -originalCenter.z * scale
        );

        loading.hidden = true;
      },
      undefined,
      (error) => {
        console.error(error);
        loading.textContent = "Could not load roblox_boy.glb";
      }
    );

    // Flat front-facing shirt layer.
    const shirtMaterial = new THREE.MeshBasicMaterial({
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
      toneMapped: false
    });

    const shirt = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      shirtMaterial
    );

    shirt.renderOrder = 20;
    scene.add(shirt);

    const fields = {
      x: document.querySelector("#x"),
      y: document.querySelector("#y"),
      w: document.querySelector("#w"),
      h: document.querySelector("#h"),
      z: document.querySelector("#z"),
      opacity: document.querySelector("#opacity")
    };

    const outputs = {
      x: document.querySelector("#xOut"),
      y: document.querySelector("#yOut"),
      w: document.querySelector("#wOut"),
      h: document.querySelector("#hOut"),
      z: document.querySelector("#zOut"),
      opacity: document.querySelector("#opacityOut")
    };

    const defaults = {
      x: 0,
      y: 2.14,
      w: 2.36,
      h: 1.52,
      z: 0.54,
      opacity: 1
    };

    function updateShirt() {
      const x = Number(fields.x.value);
      const y = Number(fields.y.value);
      const w = Number(fields.w.value);
      const h = Number(fields.h.value);
      const z = Number(fields.z.value);
      const opacity = Number(fields.opacity.value);

      shirt.position.set(x, y, z);
      shirt.scale.set(w, h, 1);
      shirtMaterial.opacity = opacity;

      outputs.x.value = x.toFixed(2);
      outputs.y.value = y.toFixed(2);
      outputs.w.value = w.toFixed(2);
      outputs.h.value = h.toFixed(2);
      outputs.z.value = z.toFixed(3);
      outputs.opacity.value = `${Math.round(opacity * 100)}%`;
    }

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", updateShirt);
    });

    function loadTexture(url) {
      new THREE.TextureLoader().load(
        url,
        (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

          if (shirtMaterial.map) shirtMaterial.map.dispose();
          shirtMaterial.map = texture;
          shirtMaterial.needsUpdate = true;
        },
        undefined,
        (error) => console.error("Could not load shirt image:", error)
      );
    }

    document.querySelector("#shirtUpload").addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      loadTexture(url);
      panel.classList.remove("open");
    });

    document.querySelector("#reset").addEventListener("click", () => {
      for (const [key, value] of Object.entries(defaults)) {
        fields[key].value = String(value);
      }
      updateShirt();
    });

    document.querySelector("#save").addEventListener("click", () => {
      renderer.render(scene, camera);
      const link = document.createElement("a");
      link.download = "roblox-shirt-preview.png";
      link.href = renderer.domElement.toDataURL("image/png");
      link.click();
    });

    function resize() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function animate() {
      requestAnimationFrame(animate);
      resize();
      renderer.render(scene, camera);
    }

    updateShirt();
    loadTexture("./sample-shirt.svg");
    animate();
  </script>
</body>
</html>
